<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ana Sayfa</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0f0f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    p {
      margin-bottom: 2rem;
      color: #666;
    }

    a.lab-link {
      display: inline-block;
      padding: 12px 28px;
      background-color: #4a6cf7;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background-color 0.3s, transform 0.2s;
      cursor: pointer;
    }

    a.lab-link:hover {
      background-color: #3455e0;
      transform: translateY(-2px);
    }

    a.lab-link:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <h1>Web Programlama</h1>
  <p>Hafta 5 — CSS Position Laboratuvarı</p>
  <a class="lab-link" href="lab-position.html">Lab 5: CSS Position Duyuru Kartı</a>
</body>
</html>
