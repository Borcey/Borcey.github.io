<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flexbox Uygulama</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    
    <nav class="navbar">
      <div class="logo">Logo</div>
      <div class="nav-links">
        <a href="#">Ana Sayfa</a>
        <a href="#">Hakkında</a>
        <a href="#">Hizmetler</a>
        <a href="#">İletişim</a>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-text">
        <h1>Flexbox Lab Uygulaması</h1>
        <p>
          Bu bölümde iki kolonlu yapı kullanıldı. Sol tarafta metin ve buton,
          sağ tarafta ise placeholder görsel kutusu yer alıyor.
        </p>
        <button>Detaylar</button>
      </div>
      <div class="hero-image">
        Görsel Kutusu
      </div>
    </section>

    <section class="cards-section">
      <div class="card">Kart 1</div>
      <div class="card">Kart 2</div>
      <div class="card">Kart 3</div>
      <div class="card">Kart 4</div>
      <div class="card">Kart 5</div>
      <div class="card">Kart 6</div>
    </section>

    <section class="grow-section">
      <div class="grow-box box1">Kutu 1</div>
      <div class="grow-box box2">Kutu 2</div>
      <div class="grow-box box3">Kutu 3</div>
    </section>

    <footer class="footer">
      <p>2026 Flexbox Ödevi</p>
    </footer>

  </div>
</body>
</html>
